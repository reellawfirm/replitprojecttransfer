kind = "web"
previewPath = "/"
title = "Reel Legal Counsel"
version = "1.0.0"
id = "artifacts/reel-legal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19986

[services.development]
run = "pnpm --filter @workspace/reel-legal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reel-legal", "run", "build" ]
publicDir = "artifacts/reel-legal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19986"
BASE_PATH = "/"
